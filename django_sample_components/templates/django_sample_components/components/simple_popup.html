{# Bootstrap 5 modal with a built-in trigger button. Docs: https://getbootstrap.com/docs/5.0/components/modal/ #}
{% load sample_tags %}

<button type="button" data-bs-toggle="modal" data-bs-target="#{{ id_modal }}" id="{{ id_button }}"
    class="{{ class_button }}">
    {{ name_button }}
</button>

{% simple_modal id_modal=id_modal title=title size=size %}{{ slot }}{% endsimple_modal %}
